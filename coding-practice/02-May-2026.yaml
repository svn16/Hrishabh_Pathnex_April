---
- name: Install and Start Nginx
  hosts: all                      #  “Run this playbook on ALL machines listed in the inventory.”
  become: yes                    # “Run this task as an admin (root user)”

  tasks:                         # tasks = actual steps to execute that plan
    - name: Install nginx
      yum:
        name: nginx
        state: present              # What final condition do you want?”

    - name: Start nginx             
      service:
        name: nginx
        state: started
        enabled: yes           # “Should this service automatically start when the system boots?”

