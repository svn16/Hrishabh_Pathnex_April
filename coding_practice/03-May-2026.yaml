---
- name: Install and start Nginx on Pathnex   #space after name. *** 
  hosts: all                                 # it's plural hostS. 
  become: yes

  tasks:
    - name: install Nginx                   # -  AFTER ONE space.
      yum:
        name: nginx                          # no capital case.
        state: present                       # no capital case 
    - name: enable Nginx                    # no capital case
      service:
        name: nginx                         #  : no space before :
        state: started
        enabled: yes

